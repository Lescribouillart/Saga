<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Tableau à Poudlard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/dialogue.css">
</head>
<body>
    <!-- Fenêtre modale de chargement -->
    <div id="loadingModal" class="loading-modal" style="cursor: url('images/pointeur.png'), default;">
        <div class="loading-modal-content">
            <div class="loading-container">
                <!-- Particules magiques -->
                <div class="magic-particles" id="particles"></div>
                
                <div class="loading-content">
                    <h1 class="loading-title">Le pub La Lanterne</h1>
                    <p class="loading-subtitle">Visite interactive</p>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    
                    <div class="progress-text">
                        <span id="progressPercent">0%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/dialogue.js"></script>
    <script src="javascript/lalanterne.js"></script>
</body>
</html>
