<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le pub La lanterne</title>
    <script src="js/brave-detect.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/dialogue.css">
    <script src="js/mobile-block.js"></script>
</head>
<body style="cursor: url('images/pointeur.png'), default;">
    <div id="mobileBlock" role="dialog" aria-modal="true">
        <div class="box">
            <h1></h1>
            <p>La lanterne est uniquement accessible sur pc avec le navigateur Brave. Merci pour votre compréhension.</p>
        </div>
    </div>
    <div class="game-container">
        <div class="game-header">
            <h2>Le pub La Lanterne</h2>
            <p>La visite commence à l'intérieur du pub...</p>
        </div>
        
        <div class="apartment-container" id="apartment">
            <div class="character" id="player">
                <img id="playerImg" class="character-sprite" src="gifs/drelall/marchebas.gif" alt="Joueur">
            </div>
        </div>
    </div>
    
    <script src="js/dialogue.js"></script>
    <script src="javascript/grille.js"></script>
    <script src="javascript/lalanterne.js"></script>
</body>
</html>
